services:
  hornbill-database:
    container_name: hornbill-database
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - hornbill-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h localhost']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hornbill-network

  hornbill-api:
    container_name: hornbill-api
    depends_on:
      hornbill-database:
        condition: service_healthy
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    env_file: .env
    environment:
      - NODE_ENV=${NODE_ENV}
    networks:
      - hornbill-network

volumes:
  hornbill-data:

networks:
  hornbill-network:
    driver: bridge
