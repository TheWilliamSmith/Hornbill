services:
  hornbill-database:
    container_name: hornbill-database
    image: postgres:17
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hornbill-dev-network

networks:
  hornbill-dev-network:
    driver: bridge

volumes:
  postgres_data:
    name: hornbill-postgres-data
