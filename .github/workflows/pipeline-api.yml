name: CICD Hornbill Pipeline Api

on:
  push:
    branches: "*"
    paths:
      - "hornbill-api/**"
      - .github/workflows/pipeline-api.yml
  pull_request:
    branches: "*"

env:
  NODE_VERSION: "24.13.0"
  PNPM_VERSION: "10.29.3"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hornbill-api

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Dependencies
        run: pnpm install

      - name: Generate Prisma
        run: pnpm prisma generate

      - name: Run Build
        run: pnpm run build

  build-and-push-docker-image-to-ecr:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: hornbill-api

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Import Secret From Vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_URL }}
          method: approle
          path: hornbill_github_action
          roleId: ${{ secrets.VAULT_SECRET_ID }}
          secretId: ${{ secrets.VAULT_SECRET_VALUE }}
          secrets: |
            hornbill-secret/data/hornbill-api/aws AWS_ACCESS_KEY_ID | AWS_ACCESS_KEY_ID ;
            hornbill-secret/data/hornbill-api/aws AWS_ACCESS_TOKEN | AWS_ACCESS_TOKEN ;
            hornbill-secret/data/hornbill-api/aws AWS_ECR_REPOSITORY | AWS_ECR_REPOSITORY ;

      - name: Get Commit Sha
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Login to Amazon ECR
        id: ecr-credentials
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract AWS Credentials
        id: aws-credentials
        run: |
          echo "image_uri=${{ steps.ecr-credentials.outputs.registry }}/${{ secrets.AWS_ECR_REPOSITORY }}" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.aws-credentials.outputs.image_uri }}:${{ steps.vars.outputs.short_sha }}
            ${{ steps.aws-credentials.outputs.image_uri }}:latest

      - name: Docker Image Pushed
        run: |
          echo "Docker image pushed to ECR: ${{ steps.aws-credentials.outputs.image_uri }}:${{ steps.vars.outputs.short_sha }}"
